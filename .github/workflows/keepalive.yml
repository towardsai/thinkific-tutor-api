name: HF Space Keepalive

on:
  workflow_dispatch:
  schedule:
    # Keep the free cpu-basic Space warm well before HF's inactivity window.
    - cron: "17 */12 * * *"

env:
  SPACE_BASE_URL: https://towardsai-tutors-thinkific-tutor-api.hf.space

jobs:
  ping:
    name: Ping HF Space
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Health check
        run: |
          curl --fail --show-error --silent --max-time 180 "$SPACE_BASE_URL/healthz"

      - name: Widget check
        run: |
          curl --fail --show-error --silent --max-time 60 "$SPACE_BASE_URL/widget.js" | grep -q "Towards AI Tutor"

      - name: Helper widget check
        run: |
          curl --fail --show-error --silent --max-time 60 "$SPACE_BASE_URL/helper-widget.js" | grep -q "Towards AI Helper"
